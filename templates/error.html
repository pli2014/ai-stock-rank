<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - AI 股票趋势分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .error-icon {
            font-size: 4em;
            margin-bottom: 30px;
            color: #e74c3c;
        }

        .error-title {
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .error-message {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .error-details {
            margin-top: 30px;
            padding: 20px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 10px;
            border-left: 4px solid #e74c3c;
            text-align: left;
        }

        .error-details p {
            margin: 5px 0;
            font-size: 0.9em;
            color: #555;
        }

        @media (max-width: 768px) {
            .error-container {
                padding: 40px 30px;
            }

            .error-title {
                font-size: 1.8em;
            }

            .error-message {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">❌</div>
        <h1 class="error-title">处理失败</h1>
        <p class="error-message">抱歉，处理您的请求时出现了错误</p>

        <div class="error-details">
            <p><strong>错误信息：</strong>{{ error }}</p>
            <p><strong>建议：</strong>请稍后重试，或联系技术支持</p>
        </div>

        <br><br>
        <a href="/" class="btn">返回首页</a>
    </div>
</body>
</html>
