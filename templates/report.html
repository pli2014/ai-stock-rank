<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>富牛科技-分析报告</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --success-color: #4cc9f0;
            --danger-color: #f72585;
            --warning-color: #f8961e;
            --info-color: #4895ef;
            --light-bg: #f8f9fa;
            --dark-text: #212529;
            --light-text: #6c757d;
            --border-color: #dee2e6;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
            --hover-shadow: 0 8px 24px rgba(0,0,0,0.1);
            
            /* 股票涨跌颜色定义 */
            --color-up: #e74c3c;
            --color-down: #27ae60;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            color: var(--dark-text);
            line-height: 1.6;
        }
        
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 15px; 
        }
        
        .header { 
            background: white; 
            border-radius: 16px; 
            padding: 30px; 
            margin-bottom: 25px; 
            box-shadow: var(--card-shadow);
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(30deg);
        }
        
        .header h1 { 
            font-size: 2.2rem; 
            margin-bottom: 10px; 
            position: relative;
            z-index: 1;
        }
        
        .header p { 
            font-size: 1.1rem; 
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin: 20px 0; 
        }
        
        .stats.horizontal {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            flex-wrap: nowrap;
            gap: 10px;
        }

        .stat-card { 
            background: white;
            border-radius: 12px; 
            padding: 18px 15px; 
            text-align: center;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            border-top: 4px solid var(--primary-color);
            min-width: 110px;
            flex: 1;
            margin: 0 5px;
        }
        
        .stat-number { 
            font-size: 1.6rem; 
            font-weight: bold; 
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--light-text);
        }
        
        @media (max-width: 768px) {
            .stats.horizontal {
                flex-wrap: nowrap;  /* 确保在小屏幕上也不换行 */
                overflow-x: auto;   /* 如果内容超出则允许水平滚动 */
                -webkit-overflow-scrolling: touch;  /* 使移动设备上的滚动更流畅 */
                justify-content: flex-start;  /* 左对齐，以便滑动查看 */
                padding-bottom: 5px;
            }
            
            .stat-card {
                min-width: 110px;
                padding: 15px 8px;
                flex: 1 0 auto;  /* 固定宽度，不压缩 */
                margin: 0 5px;
            }
            
            .stat-number {
                font-size: 1.4rem;
            }
            
            .stat-label {
                font-size: 0.7rem;
            }
            
            .container { 
                padding: 10px; 
            }
            
            .header {
                padding: 20px 15px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .table-title {
                font-size: 1.2rem;
            }
            
            .toggle-btn {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .stat-card {
                min-width: 90px;
                max-width: 120px;
                padding: 12px 6px;
                margin: 0 3px;
            }
            
            .stat-number {
                font-size: 1.1rem;
            }
            
            .stat-label {
                font-size: 0.65rem;
            }
        }
        
        .toggle-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin: 25px 0; 
            flex-wrap: wrap;
        }
        
        .toggle-btn { 
            padding: 12px 24px; 
            border: 2px solid var(--border-color); 
            border-radius: 50px; 
            background: white; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-weight: 500;
            font-size: 1rem;
        }
        
        .toggle-btn:hover {
            border-color: var(--primary-color);
        }
        
        .toggle-btn.active { 
            background: var(--primary-color); 
            color: white; 
            border-color: var(--primary-color);
        }
        
        .table-container { 
            background: white; 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: var(--card-shadow); 
            height: 70vh; 
        }
        
        .vtable-container { 
            height: calc(100% - 40px); 
            border-radius: 8px;
            overflow: hidden;
        }
        
        .table-title { 
            font-size: 1.4rem; 
            color: var(--dark-text); 
            margin-bottom: 15px; 
            font-weight: 600; 
            display: flex;
            align-items: center;
        }
        
        .table-title::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 4px;
            margin-right: 12px;
        }
        
        .stock-card { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 16px; 
            box-shadow: var(--card-shadow); 
            border-left: 4px solid var(--primary-color); 
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stock-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--hover-shadow);
        }
        
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            padding-bottom: 10px; 
            border-bottom: 1px solid var(--border-color); 
        }
        
        .card-header h2 { 
            font-size: 1.2rem; 
            color: var(--dark-text); 
            margin: 0; 
        }
        
        .card-header a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .card-header a:hover {
            color: var(--secondary-color);
        }
        
        .compact-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.9rem; 
            margin: 8px 0; 
            padding: 4px 0;
        }
        
        .compact-row span:first-child { 
            font-weight: 500; 
            color: var(--light-text); 
        }
        
        .compact-row span:last-child {
            font-weight: 500;
            color: var(--dark-text);
        }
        
        .compact-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        
        .grid-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed var(--border-color);
        }
        
        .grid-item .label {
            font-weight: 500;
            color: var(--light-text);
            font-size: 0.85rem;
        }
        
        .grid-item .value {
            font-weight: 500;
            color: var(--dark-text);
            font-size: 0.9rem;
        }
        
        .sort-tabs {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .sort-tab {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        
        .sort-tab:hover {
            border-color: var(--primary-color);
            background-color: rgba(var(--primary-color-rgb), 0.05);
        }
        
        .sort-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .stock-card.compact {
            padding: 15px;
        }
        
        .stock-card .card-header {
            padding-bottom: 8px;
        }
        
        .price-rise { 
            font-weight: bold; 
            color: #e74c3c;  /* 上涨用红色 */
        }
        
        .price-rise.negative { 
            color: #27ae60;  /* 下跌用绿色 */
        }
        
        .turnover-rate { 
            color: var(--warning-color); 
        }
        
        .market-cap { 
            color: var(--info-color); 
            font-weight: bold; 
        }
        
        .avg-volume { 
            color: #8e44ad; 
        }
        
        .no-data { 
            text-align: center; 
            padding: 40px; 
            color: var(--light-text); 
        }
        
        .loading { 
            text-align: center; 
            padding: 40px; 
            color: var(--light-text); 
            font-size: 1.2rem; 
        }
        
        .summary-container {
            background: white; 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
        }
        
        .card-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }
        
        @media (max-width: 768px) {
            .container { 
                padding: 10px; 
            }
            
            .mobile-cards { 
                display: block; 
            }
            
            .table-container, 
            .desktop-cards { 
                display: none; 
            }
            
            .header {
                padding: 20px 15px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .table-title {
                font-size: 1.2rem;
            }
            
            .toggle-btn {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
        
        @media (min-width: 769px) {
            .desktop-cards { 
                display: block; 
            }
            
            .mobile-cards { 
                display: none; 
            }
        }
        
        /* VTable自定义样式 */
        .vtable-root {
            border-radius: 8px !important;
            overflow: hidden;
        }
        
        .stat-positive {
            color: var(--color-up) !important;
        }
        
        .stat-negative {
            color: var(--color-down) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" style="position: absolute; top: 5px; left: 5px; color: white; font-size: 1.8rem; text-decoration: none; z-index: 10;">🏠</a>
            <h1>富牛科技</h1>
            <p>选取抗风险股票：市值>=50亿</p>
        </div>
        
        <div class="stats horizontal" id="summaryStats">
            <div class="stat-card">
                <div class="stat-number" id="totalStocks">-</div>
                <div class="stat-label">总股票数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-number stat-positive" id="risingStocks">-</div>
                <div class="stat-label">30日上涨</div>
            </div>
            <div class="stat-card">
                <div class="stat-number stat-negative" id="fallingStocks">-</div>
                <div class="stat-label">30日下跌</div>
            </div>
        </div>
        
        <div class="toggle-buttons" style="display:none;">
            <button class="toggle-btn active" id="tableViewBtn">表格视图</button>
            <button class="toggle-btn" id="cardViewBtn">卡片视图</button>
        </div>
        
        <div class="sort-tabs" id="sortTabs">
            <button class="sort-tab active" data-sort="default" data-order="desc">默认</button>
            <button class="sort-tab" data-sort="market_cap" data-order="desc">市值 <span class="sort-arrow desc">▼</span></button>
            <button class="sort-tab" data-sort="avg_volume" data-order="desc">成交额 <span class="sort-arrow desc">▼</span></button>
            <button class="sort-tab" data-sort="price_rise" data-order="desc">涨幅 <span class="sort-arrow desc">▼</span></button>
            <button class="sort-tab" data-sort="avg_turnover" data-order="desc">换手率 <span class="sort-arrow desc">▼</span></button>
        </div>
        
        <div class="table-container" id="tableView">
            <div class="table-title">股票分析结果</div>
            <div class="vtable-container" id="vtable-container"></div>
            <div id="loadingIndicator" class="loading">正在加载数据...</div>
        </div>
        
        <div class="mobile-cards" id="mobileCardView" style="display:none;">
            <div class="table-title">股票分析结果</div>
            <div id="mobileLoadingIndicator" class="loading">正在加载数据...</div>
            <div id="mobileCardsContainer"></div>
        </div>
        
        <div class="desktop-cards" id="desktopCardView" style="display:none;">
            <div class="table-title">股票分析结果</div>
            <div id="desktopLoadingIndicator" class="loading">正在加载数据...</div>
            <div id="desktopCardsContainer"></div>
        </div>
    </div>

    <!-- 引入VTable -->
    <script src="https://unpkg.com/@visactor/vtable/dist/vtable.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@visactor/vtable/dist/vtable.css" />

    <script>
        // 全局变量
        let stockData = [];
        let originalStockData = []; // 保存原始数据用于排序
        let tableInstance = null;
        let currentView = 'table';  // 'table', 'mobileCard', 'desktopCard'
        let currentSort = 'default';

        // 根据排序类型对数据进行排序
        function sortStockData(sortType) {
            let sortedData = [...originalStockData]; // 创建副本进行排序
            
            switch(sortType) {
                case 'market_cap_desc':
                    sortedData.sort((a, b) => b.market_cap - a.market_cap);
                    break;
                case 'market_cap_asc':
                    sortedData.sort((a, b) => a.market_cap - b.market_cap);
                    break;
                case 'avg_volume_desc':
                    sortedData.sort((a, b) => b.avg_volume - a.avg_volume);
                    break;
                case 'avg_volume_asc':
                    sortedData.sort((a, b) => a.avg_volume - b.avg_volume);
                    break;
                case 'price_rise_desc':
                    sortedData.sort((a, b) => b.price_rise - a.price_rise);
                    break;
                case 'price_rise_asc':
                    sortedData.sort((a, b) => a.price_rise - b.price_rise);
                    break;
                case 'avg_turnover_desc':
                    sortedData.sort((a, b) => b.avg_turnover - a.avg_turnover);
                    break;
                case 'avg_turnover_asc':
                    sortedData.sort((a, b) => a.avg_turnover - b.avg_turnover);
                    break;
                case 'default':
                default:
                    // 保持原始顺序
                    break;
            }
            
            stockData = sortedData;
        }

        // AJAX获取数据
        async function fetchData() {
            // 显示所有加载指示器，因为当前视图可能尚未完全确定或切换
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('mobileLoadingIndicator').style.display = 'block';
            document.getElementById('desktopLoadingIndicator').style.display = 'block';
            
            try {
                const response = await fetch('/api/analyze?limit=4000&show_all=true'); // 获取全部数据，包括推荐和不推荐的
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const result = await response.json();
                originalStockData = result.stocks || []; // 保存原始数据
                stockData = [...originalStockData]; // 初始化当前数据
                
                // 更新统计数据
                updateSummaryStats();
                
                // 隐藏所有加载指示器
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('mobileLoadingIndicator').style.display = 'none';
                document.getElementById('desktopLoadingIndicator').style.display = 'none';
                
                if (stockData.length > 0) {
                    // 初始化/刷新当前视图
                    switchView(currentView);
                } else {
                    // 如果没有数据，在对应的容器中显示提示
                    const noDataMsg = '暂无数据';
                    document.getElementById('loadingIndicator').textContent = noDataMsg;
                    document.getElementById('mobileLoadingIndicator').textContent = noDataMsg;
                    document.getElementById('desktopLoadingIndicator').textContent = noDataMsg;
                    
                    // 确保加载指示器可见以显示消息
                    document.getElementById('loadingIndicator').style.display = 'block';
                    document.getElementById('mobileLoadingIndicator').style.display = 'block';
                    document.getElementById('desktopLoadingIndicator').style.display = 'block';
                }
            } catch (error) {
                console.error('获取数据失败:', error);
                const errorMsg = '数据加载失败，请稍后重试';
                const errorColor = '#e74c3c';
                
                ['loadingIndicator', 'mobileLoadingIndicator', 'desktopLoadingIndicator'].forEach(id => {
                    const el = document.getElementById(id);
                    el.textContent = errorMsg;
                    el.style.color = errorColor;
                    el.style.display = 'block';
                });
            }
        }

        // 更新汇总统计
        function updateSummaryStats() {
            const total = stockData.length;
            const rising = stockData.filter(s => s.price_rise > 0).length;
            const falling = total - rising;

            document.getElementById('totalStocks').textContent = total;
            document.getElementById('risingStocks').textContent = rising;
            document.getElementById('fallingStocks').textContent = falling;
            
            // 根据数值更新颜色类
            const risingElement = document.getElementById('risingStocks');
            const fallingElement = document.getElementById('fallingStocks');
            
            // 移除之前的类
            risingElement.classList.remove('stat-positive', 'stat-negative');
            fallingElement.classList.remove('stat-positive', 'stat-negative');
            
            // 根据数值添加相应类（上涨数量使用绿色，下跌数量使用红色）
            if (rising > 0) {
                risingElement.classList.add('stat-positive');
            } else {
                risingElement.classList.add('stat-negative');
            }
            
            if (falling > 0) {
                fallingElement.classList.add('stat-negative');
            } else {
                fallingElement.classList.add('stat-positive');
            }
        }

        // 初始化VTable
        function initVTable() {
            if (tableInstance) {
                tableInstance.release();
            }

            const columns = [
                {
                    field: 'code',
                    title: '股票代码',
                    width: 'auto',
                    sort: true,
                    cellType: 'link',
                    templateLink: function(record) {
                        var cleanCode = record.code.replace('SH.', '').replace('SZ.', '').replace('sh.', '').replace('sz.', '');
                        var exchange = cleanCode.startsWith('3') || cleanCode.startsWith('0') ? 'SZ' : 'SH';
                        return 'https://www.futunn.com/stock/' + cleanCode + '-' + exchange;
                    },
                    target: '_blank'
                },
                {
                    field: 'name',
                    title: '股票名称',
                    width: 120,
                    sort: true
                },
                {
                    field: 'market_cap',
                    title: '市值(亿)',
                    width: 100,
                    sort: true,
                    style: {
                        textAlign: 'right',
                        color: '#4895ef'
                    }
                },
                {
                    field: 'avg_volume',
                    title: '成交额(万)',
                    width: 120,
                    sort: true,
                    style: {
                        textAlign: 'right',
                        color: '#8e44ad'
                    }
                },
                {
                    field: 'price_rise',
                    title: '涨幅',
                    width: 100,
                    sort: true,
                    formatter: function(args) {
                        var numValue = parseFloat(args.value);
                        if (!isNaN(numValue)) {
                            return (numValue * 100).toFixed(2) + '%';
                        }
                        return args.value;
                    },
                    style: {
                        textAlign: 'right',
                        color: function(args) {
                            var numValue = parseFloat(args.value);
                            return isNaN(numValue) ? '#000' : (numValue >= 0 ? '#e74c3c' : '#27ae60');  // 红涨绿跌
                        }
                    }
                },
                {
                    field: 'positive_days',
                    title: '上涨天数',
                    width: 100,
                    sort: true,
                    style: {
                        textAlign: 'right'
                    }
                },
                {
                    field: 'avg_turnover',
                    title: '换手率',
                    width: 100,
                    sort: true,
                    formatter: function(args) {
                        var numValue = parseFloat(args.value);
                        if (!isNaN(numValue)) {
                            return numValue.toFixed(2) + '%';
                        }
                        return args.value;
                    },
                    style: {
                        textAlign: 'right',
                        color: '#f8961e'
                    }
                },
                {
                    field: 'reason',
                    title: '详细分析',
                    width: 200,
                    sort: false
                }
            ];

            const option = {
                container: document.getElementById('vtable-container'),
                records: stockData,
                columns: columns,
                theme: VTable.themes.ARCO,
                heightMode: 'autoHeight',
                widthMode: 'adaptive',
                overscrollBehavior: 'none'
            };

            tableInstance = new VTable.ListTable(option);

            // 监听排序事件
            tableInstance.on(VTable.ListTable.EVENT_TYPE.SORT_CLICK, function(args) {
                console.log('Sorting by:', args.field, args.order);
            });
        }

        // 渲染卡片视图
        function renderCardView(isMobile = false) {
            const containerId = isMobile ? 'mobileCardsContainer' : 'desktopCardsContainer';
            const container = document.getElementById(containerId);
            
            container.innerHTML = ''; // 清空容器
            
            stockData.forEach(stock => {
                const cleanCode = stock.code.replace('SH.', '').replace('SZ.', '').replace('sh.', '').replace('sz.', '');
                const exchange = cleanCode.startsWith('3') || cleanCode.startsWith('0') ? 'SZ' : 'SH';
                const url = `https://www.futunn.com/stock/${cleanCode}-${exchange}`;
                
                const priceRiseVal = typeof stock.price_rise === 'number' ? stock.price_rise : parseFloat(stock.price_rise);
                const isRising = priceRiseVal >= 0;
                const colorClass = isRising ? 'text-up' : 'text-down';
                
                const card = document.createElement('div');
                card.className = 'stock-card compact';
                card.innerHTML = `
                    <div class="card-header">
                        <h2><a href="${url}" target="_blank">${stock.code} ${stock.name}</a></h2>
                        <span class="price-rise ${(typeof stock.price_rise === 'number' ? stock.price_rise : parseFloat(stock.price_rise)) < 0 ? 'negative' : ''}">${((typeof stock.price_rise === 'number' ? stock.price_rise : parseFloat(stock.price_rise)) * 100).toFixed(2)}%</span>
                    </div>
                    <div class="compact-grid">
                        <div class="grid-item">
                            <span class="label">市值:</span>
                            <span class="value market-cap">${stock.market_cap}</span>
                        </div>
                        <div class="grid-item">
                            <span class="label">成交额:</span>
                            <span class="value avg-volume">${stock.avg_volume}万</span>
                        </div>
                        <div class="grid-item">
                            <span class="label">上涨天数:</span>
                            <span class="value">${stock.positive_days}/30</span>
                        </div>
                        <div class="grid-item">
                            <span class="label">换手率:</span>
                            <span class="value turnover-rate">${(typeof stock.avg_turnover === 'number' ? stock.avg_turnover : parseFloat(stock.avg_turnover)).toFixed(2)}%</span>
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // 切换视图
        function switchView(viewType) {
            currentView = viewType;
            
            // 隐藏所有视图
            document.getElementById('tableView').style.display = 'none';
            document.getElementById('mobileCardView').style.display = 'none';
            document.getElementById('desktopCardView').style.display = 'none';
            
            // 隐藏所有加载指示器
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('mobileLoadingIndicator').style.display = 'none';
            document.getElementById('desktopLoadingIndicator').style.display = 'none';
            
            if (viewType === 'table') {
                // 显示表格视图
                document.getElementById('tableView').style.display = 'block';
                
                // 初始化VTable（如果还没有的话）
                if (stockData.length > 0) {
                    initVTable();
                }
            } else if (viewType === 'mobileCard') {
                // 显示移动端卡片视图
                document.getElementById('mobileCardView').style.display = 'block';
                renderCardView(true);
            } else if (viewType === 'desktopCard') {
                // 显示桌面端卡片视图
                document.getElementById('desktopCardView').style.display = 'block';
                renderCardView(false);
            }
        }

        // 页面加载完成后获取数据
        document.addEventListener('DOMContentLoaded', function() {
            // 根据初始屏幕尺寸设置视图
            if (window.innerWidth <= 768) {
                // 移动设备上显示卡片视图
                currentView = 'mobileCard';
                document.getElementById('mobileCardView').style.display = 'block';
                document.getElementById('desktopLoadingIndicator').style.display = 'none';
                document.getElementById('loadingIndicator').style.display = 'none';
            } else {
                // PC上显示表格视图
                currentView = 'table';
                document.getElementById('tableView').style.display = 'block';
                document.getElementById('mobileLoadingIndicator').style.display = 'none';
                document.getElementById('desktopLoadingIndicator').style.display = 'none';
            }
            
            // 获取数据
            fetchData();
            
            // 设置排序选项卡事件
            const sortTabs = document.querySelectorAll('.sort-tab');
            sortTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const sortField = this.getAttribute('data-sort');
                    
                    if (sortField === 'default') {
                        // 对于默认排序，直接应用并移除其他按钮的活动状态
                        sortTabs.forEach(t => {
                            if (t !== this) {
                                t.classList.remove('active');
                            }
                        });
                        this.classList.add('active');
                        
                        // 获取排序类型并应用排序
                        currentSort = 'default';
                        sortStockData('default');
                        
                        // 重新渲染当前视图
                        switchView(currentView);
                        return;
                    }
                    
                    // 获取当前排序顺序
                    let sortOrder = this.getAttribute('data-order') || 'desc';
                    // 切换排序顺序
                    sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
                    this.setAttribute('data-order', sortOrder);
                    
                    // 更新箭头图标
                    const arrowSpan = this.querySelector('.sort-arrow');
                    if (arrowSpan) {
                        arrowSpan.textContent = sortOrder === 'desc' ? '▼' : '▲';
                        arrowSpan.className = 'sort-arrow ' + sortOrder;
                    }
                    
                    // 移除所有激活状态
                    sortTabs.forEach(t => t.classList.remove('active'));
                    // 添加当前激活状态
                    this.classList.add('active');
                    
                    // 组合排序类型（字段_顺序）
                    const sortType = `${sortField}_${sortOrder}`;
                    
                    // 获取排序类型并应用排序
                    currentSort = sortType;
                    sortStockData(sortType);
                    
                    // 重新渲染当前视图
                    switchView(currentView);
                });
            });
            
            // 监听窗口大小变化，根据屏幕尺寸自动调整视图
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function() {
                    if (window.innerWidth <= 768) {
                        // 移动设备上显示卡片视图
                        if (currentView !== 'mobileCard') {
                            switchView('mobileCard');
                        }
                    } else {
                        // PC上显示表格视图
                        if (currentView !== 'table') {
                            switchView('table');
                        }
                    }
                }, 200); // 防抖处理
            });
        });
    </script>
</body>
</html>
